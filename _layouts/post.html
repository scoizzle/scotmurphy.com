---
layout: default
---
<article class="post">
    <header class="post-header mb-4">
        <h1>{{ page.title }}</h1>
        <p class="text-muted">
            <time datetime="{{ page.date | date_to_xmlschema }}">
                {{ page.date | date: "%B %d, %Y" }}
            </time>
            {% if page.tags %}
            <br>
            <small>
                {% for tag in page.tags %}
                <span class="badge badge-secondary">{{ tag }}</span>
                {% endfor %}
            </small>
            {% endif %}
        </p>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <nav class="mt-5">
        <a href="{{ site.baseurl }}/">&larr; Back to all posts</a>
    </nav>
</article>
